name: Deploy Blazor Wasm to Vercel

# Controls when the workflow will run
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Ensure only one deployment runs at a time to avoid conflicts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the latest code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Initialize Node.js Environment (for Tailwind CSS)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: BlazorWasm.MemoryCardsGameV2/package-lock.json

      # 3. Install NPM dependencies and Build Tailwind CSS
      - name: Install & Build Tailwind
        working-directory: BlazorWasm.MemoryCardsGameV2
        run: |
          npm install
          npm run build

      # 4. Initialize .NET Environment
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 5. Handle .NET Dependencies and Build
      - name: Restore & Build
        working-directory: BlazorWasm.MemoryCardsGameV2
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      # 6. Compile the Wasm Project for Production
      - name: Publish WasmApp
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: dotnet publish BlazorWasm.MemoryCardsGameV2/BlazorWasm.MemoryCardsGameV2.csproj -c Release -o release

      # 7. Push to Vercel
      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./release/wwwroot # Vercel needs the static assets folder